<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ARistotle — AI Object Explainer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234ade80'/><text x='50' y='72' font-size='60' text-anchor='middle' fill='%23000'>A</text></svg>">
  <link rel="stylesheet" href="style.css">
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body>

  <a-scene embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
    vr-mode-ui="enabled: false">
    <a-entity camera></a-entity>
  </a-scene>

  <div id="grid-overlay"></div>
  <div id="scan-sweep"></div>

  <div id="top-bar">
    <div class="wordmark">AR<span>istotle</span></div>
    <div class="ai-indicator">
      <div class="ai-dot"></div>
      <span class="ai-label">AI Active</span>
    </div>
    <div class="version-label">Visionary 2.0</div>
  </div>

  <div id="status-chip">Point camera at any object</div>

  <div id="crosshair">
    <div class="ch-h"></div>
    <div class="ch-v"></div>
    <div class="ch-c tl"></div>
    <div class="ch-c tr"></div>
    <div class="ch-c bl"></div>
    <div class="ch-c br"></div>
  </div>

  <div id="bottom-panel">
    <div id="panel-header">
      <span id="panel-label">Detected Objects</span>
      <span id="panel-count"></span>
    </div>
    <div id="cards">
      <div class="result-card">
        <div class="card-stripe init-stripe"></div>
        <div class="card-body">
          <div class="card-top">
            <div class="card-name init-name">Initializing</div>
          </div>
          <div class="card-text">Starting camera and AI. Point at any object to begin.</div>
          <div class="bar-row">
            <div class="bar-track">
              <div class="bar-fill init-bar"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="tech-strip">
      <span class="tech-tag">AR.js</span>
      <span class="tech-tag">YOLOv8</span>
      <span class="tech-tag">LLaMA 3</span>
      <span class="tech-tag">FastAPI</span>
      <span class="tech-tag">LangChain</span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
